{{ if gt .Paginator.TotalPages 1 }}
<nav class="pagination">
  {{ if .Paginator.HasPrev }}
  <a href="{{ .Paginator.Prev.URL }}" class="pagination-prev">← newer</a>
  {{ else }}
  <span class="pagination-prev disabled">← newer</span>
  {{ end }}
  <span class="pagination-info">{{ .Paginator.PageNumber }} / {{ .Paginator.TotalPages }}</span>
  {{ if .Paginator.HasNext }}
  <a href="{{ .Paginator.Next.URL }}" class="pagination-next">older →</a>
  {{ else }}
  <span class="pagination-next disabled">older →</span>
  {{ end }}
</nav>
{{ end }}
